<form [formGroup]="form" (ngSubmit)="handleSubmit()" class="flex flex-row items-center h-16 rounded-xl bg-white w-full px-4">

  <div class="grow">
    <div class="relative w-full">

      <input formControlName="prompt" type="text" autofocus class="flex w-full border rounded-xl text-gray-800 focus:outline-none focus:border-indigo-300 pl-4 h-10" placeholder="Mensaje...">

    </div>
  </div>

  <div class="ml-4">
      <button class="btn-primary" type="submit">
        <span class="mr-2">Send</span>
        <i class="fa-regular fa-paper-plane"></i>
      </button>
    </div>


</form>
